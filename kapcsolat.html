<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Kapcsolatfelvétel Tolnai Tímeával, a TimTim Ceramic keramikusával.">
    <meta name="theme-color" content="#3B2D2C">
    <title>Kapcsolat | TimTim Ceramic</title>
    <link rel="icon" href="images/SVG/emblem.svg" type="image/svg+xml">
    <link rel="manifest" href="site.webmanifest">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="site-header">
        <div class="wrapper header-row">
            <a class="site-logo-link" href="index.html" aria-label="TimTim Ceramic főoldal">
                <img class="site-logo" src="images/SVG/fekvo_logo.svg" alt="TimTim Ceramic logó">
            </a>

            <button class="menu-toggle" type="button" aria-controls="mainMenu" aria-expanded="false" aria-label="Menü megnyitása">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="main-nav" id="mainMenu" aria-label="Főmenü">
                <a href="index.html">Főoldal</a>
                <a href="bemutatkozas.html">Bemutatkozás</a>
                <a href="galeria.html">Galéria</a>
                <a class="active" href="kapcsolat.html">Kapcsolat</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="contact-page">
            <div class="wrapper contact-layout">
                <section class="contact-form-panel" aria-labelledby="contactTitle">
                    <h1 class="page-title" id="contactTitle">Írj nekem</h1>

                    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="koszonjuk.html">
                        <input type="hidden" name="form-name" value="contact">
                        <p class="hidden-field">
                            <label>Ne töltsd ki: <input name="bot-field"></label>
                        </p>

                        <label class="visually-hidden" for="name">Név</label>
                        <input id="name" name="name" type="text" placeholder="Név" autocomplete="name" required>

                        <label class="visually-hidden" for="email">Email</label>
                        <input id="email" name="email" type="email" placeholder="Email" autocomplete="email" required>

                        <label class="visually-hidden" for="message">Üzenet</label>
                        <textarea id="message" name="message" rows="7" placeholder="Üzenet" required></textarea>

                        <label class="privacy-check">
                            <input type="checkbox" name="privacy" value="accepted" required>
                            <span aria-hidden="true"></span>
                            <strong>Elfogadom az <a href="adatkezelesi-tajekoztato.html" target="_blank">adatvédelmi tájékoztatót</a></strong>
                        </label>

                        <button class="pill-button pill-button-dark contact-submit" type="submit">
                            Küldés
                        </button>
                    </form>
                </section>

                <aside class="contact-info-panel" aria-labelledby="contactInfoTitle">
                    <h2 id="contactInfoTitle">Kapcsolat</h2>
                    <a href="tel:+36709428979">+36 70 942 8979</a>
                    <a href="mailto:tolnai.timea2006@gmail.com">tolnai.timea2006@gmail.com</a>
                    <div class="contact-social">
                        <a href="https://www.instagram.com/timtim_ceramic/" target="_blank" rel="noreferrer" aria-label="Instagram">
                            <img src="images/icons/instagram.svg" alt="">
                        </a>
                        <a href="https://www.tiktok.com/@timtim_ceramic" target="_blank" rel="noreferrer" aria-label="TikTok">
                            <img src="images/icons/tiktok.svg" alt="">
                        </a>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-main">
            <div class="wrapper footer-grid">
                <div class="footer-brand">
                    <img src="images/SVG/allo_logo.svg" alt="TimTim Ceramic logó">
                </div>

                <div class="footer-column">
                    <h2>Elérhetőségek</h2>
                    <ul>
                        <li><a href="tel:+36709428979">+36 70 942 8979</a></li>
                        <li><a href="mailto:tolnai.timea2006@gmail.com">tolnai.timea2006@gmail.com</a></li>
                    </ul>
                </div>

                <div class="footer-column">
                    <h2>Social Media</h2>
                    <ul class="social-list">
                        <li><a href="https://www.instagram.com/timtim_ceramic/" target="_blank" rel="noreferrer"><img src="images/icons/instagram-white.svg" alt="">timtim_ceramic</a></li>
                        <li><a href="https://www.tiktok.com/@timtim_ceramic" target="_blank" rel="noreferrer"><img src="images/icons/tiktok-white.svg" alt="">timtim_ceramic</a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <p>Minden jog fenntartva! | <a href="adatkezelesi-tajekoztato.html">Adatvédelmi tájékoztató</a></p>
        </div>
    </footer>

    <script src="js/main.js" defer></script>
</body>

</html>
